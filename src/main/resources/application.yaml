server:
  port: ${PORT:8082}

spring:
  application:
    name: loan-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/loan_service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

rabbitmq:
  prefetch: ${RABBITMQ_PREFETCH:10}

catalog:
  service:
    url: ${CATALOG_SERVICE_URL:http://localhost:8081}

loan:
  due-days: ${LOAN_DUE_DAYS:30}
  reminder:
    days-before: ${LOAN_REMINDER_DAYS_BEFORE:3}

resilience4j:
  circuitbreaker:
    instances:
      catalog-client:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true